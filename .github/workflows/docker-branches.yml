name: Docker Branch Images

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - production
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image/tag from branch
        id: vars
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "${BRANCH}" != "develop" ] && [ "${BRANCH}" != "production" ] && [ "${BRANCH}" != "main" ]; then
            echo "Unsupported branch: ${BRANCH}"
            exit 1
          fi

          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "tag=${BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "image=ghcr.io/${OWNER_LOWER}/porthound4" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
